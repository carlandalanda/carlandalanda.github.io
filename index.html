<title>Cartas para mi amor</title>

<style>
body {
  font-family: 'Georgia', serif;
  background: linear-gradient(135deg, #ffe3ec, #ffd6e8);
  text-align: center;
  padding: 50px;
  color: #5a2a3c;
}

h1 {
  font-size: 40px;
  margin-bottom: 30px;
}

/* SOBRE ANIMADO */
.envelope {
  width: 180px;
  height: 120px;
  background: #ff8fb1;
  margin: 20px auto;
  border-radius: 10px;
  position: relative;
  cursor: pointer;
  transition: transform 0.3s;
}

.envelope:hover {
  transform: scale(1.05);
}

.envelope:before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 60%;
  background: #ff6f98;
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  transition: transform 0.4s ease;
  transform-origin: top;
}

.envelope.open:before {
  transform: rotateX(180deg);
}
