<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Time-Locked Letters</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 50px; }
    button { padding: 10px 20px; margin: 10px; font-size: 16px; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .letter { display: none; margin-top: 20px; font-size: 18px; }
  </style>
</head>
<body>
  <h1>Special Letters</h1>
  
  <button id="btn1">Letter 1</button>
  <div id="letter1" class="letter">💌 This is your first letter!</div>
  
  <button id="btn2">Letter 2</button>
  <div id="letter2" class="letter">💌 This is your second letter!</div>

  <script src="script.js"></script>
</body>
</html>
